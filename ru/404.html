<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[ДАННЫЕ УДАЛЕНЫ] — ФОНД SCP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      :root {
        --red: #b3121b;
        --red-soft: #d23a42;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #050505;
        color: #cbcbc4;
        font-family: "Share Tech Mono", monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        overflow: hidden;
      }
      .scan {
        position: fixed; inset: 0; pointer-events: none; z-index: 5;
        background: repeating-linear-gradient(
          to bottom, transparent 0, transparent 2px,
          rgba(0,0,0,.3) 3px, rgba(0,0,0,.3) 3px);
        mix-blend-mode: multiply;
      }
      .vig {
        position: fixed; inset: 0; pointer-events: none; z-index: 5;
        background: radial-gradient(ellipse at center,
          transparent 42%, rgba(0,0,0,.6) 100%);
      }
      main {
        position: relative;
        z-index: 2;
      }
      .code {
        font-family: "VT323", monospace;
        font-size: clamp(6rem, 26vw, 14rem);
        line-height: 0.9;
        color: #cbcbc4;
        position: relative;
      }
      .code::before, .code::after {
        content: "404"; position: absolute; inset: 0; opacity: .85;
      }
      .code::before { left: 3px; text-shadow: -3px 0 var(--red);
        animation: g 2.4s infinite linear alternate-reverse; }
      .code::after { left: -3px; text-shadow: 3px 0 #36e0e6;
        animation: g 3.2s infinite linear alternate-reverse; }
      @keyframes g {
        0% { clip-path: inset(0 0 82% 0); }
        50% { clip-path: inset(55% 0 12% 0); }
        100% { clip-path: inset(12% 0 70% 0); }
      }
      .tag { color: var(--red); letter-spacing: .3em; font-size: 13px; }
      .msg { margin: 18px 0 16px; color: var(--red-soft);
        letter-spacing: .1em; }
      .submsg {
        margin: 0 0 26px;
        color: #6d6d68;
        font-size: 12px;
        letter-spacing: .12em;
      }
      a.return-link {
        color: var(--red-soft); border: 1px solid var(--red);
        padding: 10px 22px; text-decoration: none;
        font-family: "VT323", monospace; font-size: 1.4rem;
        letter-spacing: .1em; transition: .2s;
      }
      a.return-link:hover { background: var(--red); color: #fff;
        box-shadow: 0 0 22px rgba(179,18,27,.6); }
      .blink { animation: b 1.1s steps(2) infinite; }
      @keyframes b { 50% { opacity: 0; } }
      #term-toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 9960;
      }
    </style>
</head>
  <body>
    <button id="term-toggle" class="term-toggle" type="button" title="Открыть терминал восстановления">&gt;_</button>
    <div class="scan"></div>
    <div class="vig"></div>
    <main>
      <div class="tag">ЗАПИСЬ НЕ НАЙДЕНА В АРХИВЕ</div>
      <div class="code">404</div>
      <div class="msg">
        [ДАННЫЕ УДАЛЕНЫ] · этого документа не существует<span class="blink">_</span>
      </div>
      <div class="submsg">обнаружена сохранённая копия в базе данных</div>
      <a class="return-link" href="./index.html">▸ ВЕРНУТЬСЯ К ДЕЛУ SCP-KΣ-0001</a>
    </main>

    <div id="site-terminal" class="site-terminal hidden" aria-hidden="true">
      <div class="term-header">
        <span class="term-title">SCP-KΣ-0001 // ТЕРМИНАЛ ВОССТАНОВЛЕНИЯ</span>
        <div class="term-controls">
          <span class="term-status"><span class="livedot" style="width:7px;height:7px;display:inline-block;border-radius:50%;background:#57e06a"></span> РЕЖИМ ВОССТ.</span>
          <button id="term-close" class="term-close" type="button">[X]</button>
        </div>
      </div>
      <div id="term-log" class="term-log"></div>
      <form id="term-form" class="term-input-row" autocomplete="off" action="javascript:void(0)" method="get" onsubmit="return false;">
        <span class="term-prompt">&gt;_</span>
        <input id="term-input" class="term-input" type="text" name="cmd" autocomplete="off" spellcheck="false" placeholder="введите команду..." />
        <button type="submit" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" tabindex="-1" aria-hidden="true">go</button>
      </form>
      <div class="term-help">help — список команд · TAB — автодополнение · ESC — закрыть</div>
    </div>

    <script>
      (function () {
        "use strict";
        var locale = "ru-RU";
        var ERASURE_KEY = "scp-erasure-active";
        var BLACKOUT_KEY = "scp-blackout-until";
        var termEl = document.getElementById("site-terminal");
        var termLogEl = document.getElementById("term-log");
        var termInput = document.getElementById("term-input");
        var termToggle = document.getElementById("term-toggle");
        var termClose = document.getElementById("term-close");
        var termForm = document.getElementById("term-form");

        function nowTs() {
          return new Date().toLocaleTimeString(locale, { hour12: false });
        }
        function termAddEntry(html, cls) {
          if (!termLogEl) return;
          var div = document.createElement("div");
          div.className = "term-entry " + (cls || "info");
          var ts = document.createElement("span");
          ts.className = "ts";
          ts.textContent = "[" + nowTs() + "]";
          div.appendChild(ts);
          var span = document.createElement("span");
          span.innerHTML = " " + html;
          div.appendChild(span);
          termLogEl.appendChild(div);
          termLogEl.scrollTop = termLogEl.scrollHeight;
        }
        function termLog(msg, type) {
          termAddEntry(msg, type || "info");
        }
        function termOpen() {
          if (!termEl) return;
          termEl.classList.remove("hidden");
          termEl.setAttribute("aria-hidden", "false");
          if (termInput) termInput.focus();
          termLog("терминал открыт", "cmd");
        }
        function termCloseFn() {
          if (!termEl) return;
          termEl.classList.add("hidden");
          termEl.setAttribute("aria-hidden", "true");
        }
        function clearPersistentState() {
          try {
            localStorage.removeItem(ERASURE_KEY);
            localStorage.removeItem(BLACKOUT_KEY);
            sessionStorage.removeItem(BLACKOUT_KEY);
            sessionStorage.removeItem("scp-km-states");
            document.cookie = ERASURE_KEY + "=; Max-Age=0; path=/";
            document.cookie = BLACKOUT_KEY + "=; Max-Age=0; path=/";
          } catch (e) {}
        }
        function isErasureActive() {
          try {
            if (localStorage.getItem(ERASURE_KEY) === "1") return true;
            var m = document.cookie.match(new RegExp("(?:^| )" + ERASURE_KEY + "=([^;]+)"));
            return !!(m && decodeURIComponent(m[1]) === "1");
          } catch (e) {}
          return false;
        }
        function reboot() {
          termLog("--- ИНИЦИИРОВАНА ПЕРЕЗАГРУЗКА СИСТЕМЫ ---", "sys");
          clearPersistentState();
          termLog("Копия файла обнаружена, восстановление состояния...", "info");
          setTimeout(function () {
            termLog("Возврат к SCP-KΣ-0001...", "sys");
          }, 10700);
          setTimeout(function () {
            window.location.href = "./index.html";
          }, 700);
        }
        var COMMANDS = {
          help: function () {
            termLog("Доступные команды:", "sys");
            termLog("  help / ? - показать список", "info");
            termLog("  reboot - перезапустить терминал и загрузить резервную копию файла (если доступно)", "info");
            termLog("  clear - очистить терминал", "info");
            termLog("  status - статус документа", "info");
          },
          clear: function () {
            if (termLogEl) termLogEl.innerHTML = "";
            termLog("Терминал очищен", "sys");
          },
          status: function () {
            termLog("Состояние документа: " + (isErasureActive() ? "СТЁРТ" : "ДОСТУПЕН"), isErasureActive() ? "err" : "info");
            termLog("Резервная копия: доступна командой reboot", "info");
            termLog("Маршрут восстановления: ./index.html", "info");
          }
        };
        function processCommand(raw) {
          var cmd = raw.trim();
          if (!cmd) return;
          termAddEntry(cmd, "user");
          var low = cmd.toLowerCase().replace(/\s+/g, "");
          if (low === "help" || low === "?") COMMANDS.help();
          else if (low === "clear" || low === "cls") COMMANDS.clear();
          else if (low === "status") COMMANDS.status();
          else if (low === "reboot" || low === "restart" || low === "clearall") reboot();
          else {
            termLog("'" + cmd + "' не является командой", "err");
            termLog("Введите help для списка", "info");
          }
        }

        if (termToggle) {
          termToggle.addEventListener("click", function () {
            if (termEl && termEl.classList.contains("hidden")) termOpen();
            else termCloseFn();
          });
        }
        if (termClose) termClose.addEventListener("click", termCloseFn);
        document.addEventListener("keydown", function (e) {
          var ae = document.activeElement;
          var inTerm = ae && (ae.id === "term-input" || (termEl && termEl.contains(ae)));
          if (e.key === "Escape" && termEl && !termEl.classList.contains("hidden")) {
            termCloseFn();
            return;
          }
          if (!inTerm && (e.key === "`" || e.key === "ё")) {
            e.preventDefault();
            if (termEl.classList.contains("hidden")) termOpen();
            else termCloseFn();
          }
        });
        if (termInput) {
          termInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
              e.preventDefault();
              var v = termInput.value;
              termInput.value = "";
              processCommand(v);
            }
            if (e.key === "Tab") {
              e.preventDefault();
              var cur = termInput.value.toLowerCase();
              var all = ["help", "reboot", "clear", "status"];
              for (var i = 0; i < all.length; i++) {
                if (all[i].indexOf(cur) === 0) {
                  termInput.value = all[i];
                  break;
                }
              }
            }
          });
        }
        if (termForm) {
          termForm.addEventListener("submit", function (e) {
            e.preventDefault();
            var v = termInput.value;
            termInput.value = "";
            processCommand(v);
          });
        }

        termLog("ТЕРМИНАЛ ВОССТАНОВЛЕНИЯ ГОТОВ", "sys");
        termLog("Загружена резервная копия документа", "info");
        if (isErasureActive()) {
          termLog("[КРИТИЧНО] РЕЗЕРВНАЯ КОПИЯ: МЕМЕТИЧЕСКОЕ ЗАРАЖЕНИЕ", "err");
          termLog("Используйте reboot для восстановления документа из резервной копии", "warn");
        } else {
          termLog("Постоянный флаг стирания не обнаружен", "info");
        }
      })();
    </script>
  </body>
</html>
